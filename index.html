<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLLPAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0f0f0f;
            color: #e5e5e5;
        }
        
        .window {
            background: #1a1a1a;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .title-bar {
            background: #111111;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #141414;
        }
        
        .card {
            background: #1f1f1f;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        
        button {
            transition: all 0.2s;
        }
        
        button:hover {
            transform: translateY(-1px);
        }
        
        .list-item {
            background: #1f1f1f;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        
        .list-item:hover {
            border-color: #555;
            background: #252525;
        }
        
        .last-roll {
            background: #22c55e;
            color: #000;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            margin-bottom: 8px;
            display: inline-block;
        }
        
        input {
            background: #252525;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
        }
        
        .menu-btn {
            background: #222;
            border: 1px solid #444;
            color: #ddd;
        }
        
        .menu-btn:hover {
            background: #333;
            border-color: #666;
        }
    </style>
</head>
<body>
<div class="window max-w-5xl mx-auto mt-4">
    <!-- Title Bar -->
    <div class="title-bar">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-dice-d20 text-emerald-400 text-2xl"></i>
            <h1 class="text-xl font-semibold tracking-tight">ROLLPAD</h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleEditMode()" 
                    class="px-4 py-1.5 bg-zinc-800 hover:bg-zinc-700 rounded-lg flex items-center gap-2 text-sm">
                <i class="fa-solid fa-pen"></i>
                <span id="edit-status">VIEW MODE</span>
            </button>
        </div>
    </div>

    <!-- Menu Bar -->
    <div class="bg-zinc-900 border-b border-zinc-800 px-6 py-3 flex gap-2 flex-wrap">
        <button onclick="addCreature()" 
                class="menu-btn px-5 py-2 rounded-lg flex items-center gap-2 text-sm font-medium">
            <i class="fa-solid fa-plus"></i> NEW CREATURE
        </button>
        <button onclick="saveEncounter()" 
                class="menu-btn px-5 py-2 rounded-lg flex items-center gap-2 text-sm font-medium">
            <i class="fa-solid fa-floppy-disk"></i> SAVE
        </button>
        <button onclick="loadEncounterPrompt()" 
                class="menu-btn px-5 py-2 rounded-lg flex items-center gap-2 text-sm font-medium">
            <i class="fa-solid fa-folder-open"></i> LOAD
        </button>
        <button onclick="importJSON()" 
                class="menu-btn px-5 py-2 rounded-lg flex items-center gap-2 text-sm font-medium">
            <i class="fa-solid fa-file-import"></i> IMPORT
        </button>
        <button onclick="exportJSON()" 
                class="menu-btn px-5 py-2 rounded-lg flex items-center gap-2 text-sm font-medium">
            <i class="fa-solid fa-file-export"></i> EXPORT
        </button>
        <button onclick="clearAllData()" 
                class="menu-btn px-5 py-2 rounded-lg flex items-center gap-2 text-sm font-medium text-red-400 hover:text-red-300">
            <i class="fa-solid fa-trash"></i> CLEAR ALL
        </button>
    </div>

    <!-- Main Content -->
    <div class="main">
        <div class="flex justify-between items-center mb-8">
            <h2 id="current-name" class="text-3xl font-bold text-white">NO CREATURE SELECTED</h2>
            <div class="text-sm text-zinc-500">
                Creatures: <span id="creature-count" class="font-mono text-emerald-400">0</span>
            </div>
        </div>

        <!-- Add Move Section -->
        <div class="card" id="add-move-section">
            <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-bolt text-yellow-400"></i> ADD NEW MOVE
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="move-name" placeholder="Move Name (e.g. Fireball)" class="px-4 py-3 w-full">
                <input type="text" id="move-dice" placeholder="Dice (e.g. 8d6+4)" class="px-4 py-3 w-full">
                <button onclick="addMoveToCurrent()" 
                        class="bg-emerald-600 hover:bg-emerald-500 text-white font-medium rounded-lg">
                    ADD MOVE
                </button>
            </div>
        </div>

        <!-- Moves -->
        <h3 class="text-lg font-semibold mb-4 mt-8 flex items-center gap-2">
            <i class="fa-solid fa-swords text-orange-400"></i> MOVES
        </h3>
        <div id="moves-list" class="space-y-3"></div>

        <!-- Custom Tables -->
        <div class="mt-12">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold flex items-center gap-2">
                    <i class="fa-solid fa-table text-sky-400"></i> CUSTOM TABLES
                </h3>
                <button onclick="addCustomTable()" 
                        class="bg-zinc-800 hover:bg-zinc-700 px-5 py-2 rounded-lg text-sm flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> NEW TABLE
                </button>
            </div>
            <div id="tables-container" class="space-y-3"></div>
        </div>
    </div>

    <!-- Footer -->
    <div class="bg-zinc-900 text-xs text-zinc-500 px-6 py-3 border-t border-zinc-800 flex justify-between">
        <div>Modern Edition • Built for Tabletop</div>
        <div id="edit-status-footer" class="font-mono">VIEW MODE</div>
    </div>
</div>

<script>
// ====================== DATA ======================
let creatures = [];
let currentCreatureIndex = -1;
let customTables = [];
let editMode = false;

// ====================== EDIT MODE ======================
function toggleEditMode() {
    editMode = !editMode;
    const status = editMode ? "EDIT MODE" : "VIEW MODE";
    document.getElementById('edit-status').textContent = status;
    document.getElementById('edit-status-footer').textContent = status;
    updateUI();
}

// ====================== DICE ======================
function rollDice(expr) {
    let total = 0, rolls = [];
    const parts = expr.replace(/\s/g,'').match(/[+-]?\d+d\d+|[+-]?\d+/gi) || [];
    for (let part of parts) {
        if (part.includes('d')) {
            const sign = part.startsWith('-') ? -1 : 1;
            const [count, sides] = part.replace(/^[+-]/,'').split('d').map(n => parseInt(n));
            for (let i = 0; i < (count || 1); i++) {
                const r = Math.floor(Math.random() * sides) + 1;
                rolls.push(r);
                total += sign * r;
            }
        } else total += parseInt(part);
    }
    return { total: total || 0, details: rolls.join('+') + '=' + total };
}

// ====================== UI ======================
function updateUI() {
    document.getElementById('creature-count').textContent = creatures.length;
    document.getElementById('current-name').textContent = 
        currentCreatureIndex >= 0 ? creatures[currentCreatureIndex].name.toUpperCase() : "NO CREATURE SELECTED";
    renderMoves();
    renderTables();
}

// ====================== MOVES ======================
function renderMoves() {
    const container = document.getElementById('moves-list');
    container.innerHTML = '';
    if (currentCreatureIndex < 0) return;

    creatures[currentCreatureIndex].moves.forEach((move, i) => {
        const div = document.createElement('div');
        div.className = 'list-item flex items-center justify-between';
        div.innerHTML = `
            <div class="flex-1">
                ${move.lastRoll !== undefined ? `<div class="last-roll">Rolled ${move.lastRoll}</div>` : ''}
                <strong class="text-lg">${move.name}</strong><br>
                <span class="text-emerald-400 font-mono">${move.dice}</span>
            </div>
            <div class="flex gap-2">
                <button onclick="rollMove(${i})" 
                        class="bg-zinc-800 hover:bg-zinc-700 px-6 py-2 rounded-lg">
                    <i class="fa-solid fa-dice"></i> ROLL
                </button>
                ${editMode ? `
                <button onclick="removeMove(${i})" 
                        class="bg-red-900 hover:bg-red-800 px-4 py-2 rounded-lg">
                    <i class="fa-solid fa-trash"></i>
                </button>` : ''}
            </div>
        `;
        container.appendChild(div);
    });
}

function rollMove(i) {
    const move = creatures[currentCreatureIndex].moves[i];
    const result = rollDice(move.dice);
    move.lastRoll = result.total;
    renderMoves();
}

// ====================== TABLES ======================
function renderTables() {
    const container = document.getElementById('tables-container');
    container.innerHTML = '';

    customTables.forEach((table, idx) => {
        const div = document.createElement('div');
        div.className = 'list-item flex items-center justify-between';
        
        let lastHTML = '';
        if (table.lastRoll !== undefined && table.lastRoll !== null) {
            lastHTML = `<div class="last-roll">${table.lastRoll} — ${table.entries[table.lastRoll-1] || '(empty)'}</div>`;
        }

        div.innerHTML = `
            <div>
                ${lastHTML}
                <strong>${table.name}</strong> <span class="text-zinc-500 text-sm">(${table.sides} entries)</span>
            </div>
            <div class="flex gap-2">
                <button onclick="rollTable(${idx})" 
                        class="bg-zinc-800 hover:bg-zinc-700 px-6 py-2 rounded-lg">
                    <i class="fa-solid fa-dice"></i> ROLL
                </button>
                ${editMode ? `
                <button onclick="deleteTable(${idx})" 
                        class="bg-red-900 hover:bg-red-800 px-4 py-2 rounded-lg">
                    <i class="fa-solid fa-trash"></i>
                </button>` : ''}
            </div>
        `;
        container.appendChild(div);
    });
}

function rollTable(idx) {
    const table = customTables[idx];
    const roll = Math.floor(Math.random() * table.sides) + 1;
    table.lastRoll = roll;
    renderTables();
}

// ====================== CREATURE FUNCTIONS ======================
function addCreature() {
    const name = prompt("Creature Name:");
    if (!name) return;
    creatures.push({ name: name.trim(), moves: [] });
    currentCreatureIndex = creatures.length - 1;
    updateUI();
}

function addMoveToCurrent() {
    if (currentCreatureIndex < 0) return alert("Select a creature first");
    
    const name = document.getElementById('move-name').value.trim();
    const dice = document.getElementById('move-dice').value.trim();
    
    if (!name || !dice) return alert("Name and dice expression required");
    
    creatures[currentCreatureIndex].moves.push({name, dice});
    document.getElementById('move-name').value = '';
    document.getElementById('move-dice').value = '';
    renderMoves();
}

function removeMove(i) {
    if (confirm("Delete this move?")) {
        creatures[currentCreatureIndex].moves.splice(i, 1);
        renderMoves();
    }
}

// ====================== TABLE FUNCTIONS ======================
function addCustomTable() {
    const name = prompt("Table Name:");
    if (!name) return;
    const sides = parseInt(prompt("Number of entries?", "8")) || 8;
    const entries = [];
    for (let i = 1; i <= sides; i++) {
        const entry = prompt(`Entry ${i}/${sides}:`) || "(empty)";
        entries.push(entry);
    }
    customTables.push({name, sides, entries, lastRoll: null});
    renderTables();
}

function deleteTable(idx) {
    if (confirm("Delete this table?")) {
        customTables.splice(idx, 1);
        renderTables();
    }
}

// ====================== SAVE / LOAD ======================
function saveEncounter() {
    localStorage.setItem('rollpad_modern', JSON.stringify({creatures, customTables}));
    alert("✅ Encounter saved");
}

function loadEncounterPrompt() {
    const data = localStorage.getItem('rollpad_modern');
    if (!data) return alert("No saved encounter found");
    if (!confirm("Load saved encounter?")) return;
    
    const parsed = JSON.parse(data);
    creatures = parsed.creatures || [];
    customTables = parsed.customTables || [];
    currentCreatureIndex = creatures.length ? 0 : -1;
    updateUI();
}

function importJSON() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const data = JSON.parse(ev.target.result);
                creatures = data.creatures || [];
                customTables = data.customTables || [];
                currentCreatureIndex = creatures.length ? 0 : -1;
                updateUI();
                alert("✅ JSON imported successfully");
            } catch(err) {
                alert("Invalid JSON file");
            }
        };
        reader.readAsText(e.target.files[0]);
    };
    input.click();
}

function exportJSON() {
    const data = {creatures, customTables};
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'rollpad.json';
    a.click();
}

function clearAllData() {
    if (confirm("Erase everything?")) {
        creatures = [];
        customTables = [];
        currentCreatureIndex = -1;
        localStorage.removeItem('rollpad_modern');
        updateUI();
    }
}

// ====================== INIT ======================
updateUI();
if (creatures.length === 0) {
    creatures.push({
        name: "GOBLIN", 
        moves: [
            {name: "Bite", dice: "1d6+2"},
            {name: "Scratch", dice: "1d4"}
        ]
    });
    currentCreatureIndex = 0;
    updateUI();
}
</script>
</body>
</html>
