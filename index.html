<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLLPAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
        }
        
        .window {
            background: #111111;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 1480px;
            margin: 20px auto;
            border: 1px solid #333;
        }
        
        .title-bar {
            background: #1a1a1a;
            padding: 16px 24px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
            background: #141414;
        }
        
        .sidebar {
            width: 340px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            padding: 20px;
            overflow-y: auto;
        }
        
        .creature-item {
            background: #222;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .creature-item:hover {
            background: #2a2a2a;
            border-color: #666;
        }
        
        .creature-item.active {
            background: #1f2937;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }
        
        .card {
            background: #1f1f1f;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 28px;
            border: 1px solid #333;
        }
        
        input {
            background: #252525;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            font-size: 1.1rem;
        }
        
        button {
            transition: all 0.2s;
        }
        
        button:hover {
            transform: translateY(-1px);
        }
        
        .last-roll {
            background: #22c55e;
            color: #000;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            display: inline-block;
        }
        
        .list-item {
            background: #1f1f1f;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }
        
        .list-item:hover {
            border-color: #555;
            background: #252525;
        }
    </style>
</head>
<body>
<div class="window">
    <!-- Title Bar -->
    <div class="title-bar">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-dice-d20 text-emerald-400 text-3xl"></i>
            <h1 class="text-3xl font-semibold tracking-tight">ROLLPAD</h1>
        </div>
        <button onclick="toggleEditMode()" 
                class="px-6 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-xl flex items-center gap-2 font-medium">
            <i class="fa-solid fa-pen"></i>
            <span id="edit-status">VIEW MODE</span>
        </button>
    </div>

    <!-- Menu Bar -->
    <div class="bg-zinc-900 border-b border-zinc-800 px-8 py-4 flex gap-3 flex-wrap">
        <button onclick="addCreature()" 
                class="menu-btn px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-xl flex items-center gap-2">
            <i class="fa-solid fa-plus"></i> NEW CREATURE
        </button>
        <button onclick="saveEncounter()" 
                class="menu-btn px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-xl flex items-center gap-2">
            <i class="fa-solid fa-floppy-disk"></i> SAVE
        </button>
        <button onclick="loadEncounterPrompt()" 
                class="menu-btn px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-xl flex items-center gap-2">
            <i class="fa-solid fa-folder-open"></i> LOAD
        </button>
        <button onclick="importJSON()" 
                class="menu-btn px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-xl flex items-center gap-2">
            <i class="fa-solid fa-file-import"></i> IMPORT
        </button>
        <button onclick="exportJSON()" 
                class="menu-btn px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-xl flex items-center gap-2">
            <i class="fa-solid fa-file-export"></i> EXPORT
        </button>
        <button onclick="clearAllData()" 
                class="menu-btn px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-xl flex items-center gap-2 text-red-400">
            <i class="fa-solid fa-trash"></i> CLEAR ALL
        </button>
    </div>

    <div class="main">
        <!-- Creature Sidebar -->
        <div class="sidebar">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-semibold">BESTIARY</h3>
                <span id="creature-count" class="text-emerald-400 font-mono">0</span>
            </div>
            <div id="creature-list" class="space-y-2"></div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-8 overflow-y-auto">
            <h2 id="current-name" class="text-4xl font-bold mb-8">NO CREATURE SELECTED</h2>

            <!-- Add Move Section (Hidden in View Mode) -->
            <div id="add-move-section" class="card hidden">
                <h3 class="text-xl font-semibold mb-5 flex items-center gap-2">
                    <i class="fa-solid fa-bolt text-yellow-400"></i> ADD NEW MOVE
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="move-name" placeholder="Move Name (e.g. Fireball)" class="px-5 py-4 w-full">
                    <input type="text" id="move-dice" placeholder="Dice (e.g. 8d6+4)" class="px-5 py-4 w-full">
                    <button onclick="addMoveToCurrent()" 
                            class="bg-emerald-600 hover:bg-emerald-500 text-white font-medium rounded-xl">
                        ADD MOVE
                    </button>
                </div>
            </div>

            <!-- Moves -->
            <h3 class="text-xl font-semibold mb-5 flex items-center gap-2">
                <i class="fa-solid fa-swords text-orange-400"></i> MOVES
            </h3>
            <div id="moves-list" class="space-y-4"></div>

            <!-- Custom Tables -->
            <div class="mt-12">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-table text-sky-400"></i> CUSTOM TABLES
                    </h3>
                    <button id="new-table-btn" onclick="addCustomTable()" 
                            class="hidden bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-xl text-sm flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> NEW TABLE
                    </button>
                </div>
                <div id="tables-container" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="bg-zinc-900 text-xs text-zinc-500 px-8 py-4 border-t border-zinc-800 flex justify-between">
        <div>Modern Edition • Built for Tabletop</div>
        <div id="edit-status-footer" class="font-mono">VIEW MODE</div>
    </div>
</div>

<script>
// ====================== DATA ======================
let creatures = [];
let currentCreatureIndex = -1;
let customTables = [];
let editMode = false;

// ====================== EDIT MODE ======================
function toggleEditMode() {
    editMode = !editMode;
    const status = editMode ? "EDIT MODE" : "VIEW MODE";
    document.getElementById('edit-status').textContent = status;
    document.getElementById('edit-status-footer').textContent = status;
    
    // Show/Hide edit-only elements
    document.getElementById('add-move-section').classList.toggle('hidden', !editMode);
    document.getElementById('new-table-btn').classList.toggle('hidden', !editMode);
    
    updateUI();
}

// ====================== DICE ======================
function rollDice(expr) {
    let total = 0;
    const parts = expr.replace(/\s/g,'').match(/[+-]?\d+d\d+|[+-]?\d+/gi) || [];
    for (let part of parts) {
        if (part.includes('d')) {
            const sign = part.startsWith('-') ? -1 : 1;
            const [count, sides] = part.replace(/^[+-]/,'').split('d').map(n => parseInt(n));
            for (let i = 0; i < (count || 1); i++) {
                total += sign * (Math.floor(Math.random() * sides) + 1);
            }
        } else {
            total += parseInt(part);
        }
    }
    return { total: total || 0 };
}

// ====================== UI ======================
function updateUI() {
    document.getElementById('creature-count').textContent = creatures.length;
    document.getElementById('current-name').textContent = 
        currentCreatureIndex >= 0 ? creatures[currentCreatureIndex].name.toUpperCase() : "NO CREATURE SELECTED";
    renderCreatureList();
    renderMoves();
    renderTables();
}

function renderCreatureList() {
    const container = document.getElementById('creature-list');
    container.innerHTML = '';
    
    creatures.forEach((creature, idx) => {
        const div = document.createElement('div');
        div.className = `creature-item flex justify-between items-center ${idx === currentCreatureIndex ? 'active' : ''}`;
        div.innerHTML = `
            <div class="font-medium">${creature.name}</div>
            <div class="text-emerald-400 text-sm">${creature.moves.length} moves</div>
        `;
        div.onclick = () => {
            currentCreatureIndex = idx;
            updateUI();
        };
        container.appendChild(div);
    });
}

// ====================== MOVES ======================
function renderMoves() {
    const container = document.getElementById('moves-list');
    container.innerHTML = '';
    if (currentCreatureIndex < 0) return;

    creatures[currentCreatureIndex].moves.forEach((move, i) => {
        const div = document.createElement('div');
        div.className = 'list-item flex items-center justify-between';
        div.innerHTML = `
            <div>
                ${move.lastRoll !== undefined ? `<div class="last-roll">Rolled ${move.lastRoll}</div>` : ''}
                <div class="text-2xl font-medium">${move.name}</div>
                <div class="text-emerald-400 font-mono">${move.dice}</div>
            </div>
            <div class="flex gap-3">
                <button onclick="rollMove(${i}); event.stopImmediatePropagation()" 
                        class="bg-zinc-800 hover:bg-zinc-700 px-8 py-4 rounded-xl">ROLL</button>
                ${editMode ? `
                <button onclick="removeMove(${i}); event.stopImmediatePropagation()" 
                        class="bg-red-900 hover:bg-red-800 px-5 py-4 rounded-xl">
                    <i class="fa-solid fa-trash"></i>
                </button>` : ''}
            </div>
        `;
        container.appendChild(div);
    });
}

function rollMove(i) {
    const move = creatures[currentCreatureIndex].moves[i];
    const result = rollDice(move.dice);
    move.lastRoll = result.total;
    renderMoves();
}

// ====================== TABLES ======================
function renderTables() {
    const container = document.getElementById('tables-container');
    container.innerHTML = '';

    customTables.forEach((table, idx) => {
        const div = document.createElement('div');
        div.className = 'list-item';
        let lastHTML = '';
        if (table.lastRoll !== undefined && table.lastRoll !== null) {
            lastHTML = `<div class="last-roll">Roll ${table.lastRoll} — ${table.entries[table.lastRoll-1] || '(empty)'}</div>`;
        }
        div.innerHTML = `
            <div class="flex justify-between items-center">
                <div>
                    ${lastHTML}
                    <div class="text-xl font-medium">${table.name}</div>
                    <div class="text-zinc-400">(${table.sides} entries)</div>
                </div>
                <div class="flex gap-3">
                    <button onclick="rollTable(${idx}); event.stopImmediatePropagation()" 
                            class="bg-zinc-800 hover:bg-zinc-700 px-8 py-4 rounded-xl">ROLL</button>
                    ${editMode ? `
                    <button onclick="deleteTable(${idx}); event.stopImmediatePropagation()" 
                            class="bg-red-900 hover:bg-red-800 px-5 py-4 rounded-xl">
                        <i class="fa-solid fa-trash"></i>
                    </button>` : ''}
                </div>
            </div>
        `;
        container.appendChild(div);
    });
}

function rollTable(idx) {
    const table = customTables[idx];
    const roll = Math.floor(Math.random() * table.sides) + 1;
    table.lastRoll = roll;
    renderTables();
}

// ====================== CREATURE FUNCTIONS ======================
function addCreature() {
    const name = prompt("Creature Name:");
    if (!name) return;
    creatures.push({ name: name.trim(), moves: [] });
    currentCreatureIndex = creatures.length - 1;
    updateUI();
}

function addMoveToCurrent() {
    if (currentCreatureIndex < 0) return alert("Select a creature first");
    const name = document.getElementById('move-name').value.trim();
    const dice = document.getElementById('move-dice').value.trim();
    if (!name || !dice) return alert("Name and dice required");
    
    creatures[currentCreatureIndex].moves.push({name, dice});
    document.getElementById('move-name').value = '';
    document.getElementById('move-dice').value = '';
    renderMoves();
}

function removeMove(i) {
    if (confirm("Delete this move?")) {
        creatures[currentCreatureIndex].moves.splice(i, 1);
        renderMoves();
    }
}

// ====================== TABLE FUNCTIONS ======================
function addCustomTable() {
    const name = prompt("Table Name:");
    if (!name) return;
    const sides = parseInt(prompt("Number of entries?", "8")) || 8;
    const entries = [];
    for (let i = 1; i <= sides; i++) {
        const entry = prompt(`Entry ${i}/${sides}:`) || "(empty)";
        entries.push(entry);
    }
    customTables.push({name, sides, entries, lastRoll: null});
    renderTables();
}

function deleteTable(idx) {
    if (confirm("Delete this table?")) {
        customTables.splice(idx, 1);
        renderTables();
    }
}

// ====================== SAVE / LOAD ======================
function saveEncounter() {
    localStorage.setItem('rollpad_modern', JSON.stringify({creatures, customTables}));
    alert("✅ Encounter saved");
}

function loadEncounterPrompt() {
    const data = localStorage.getItem('rollpad_modern');
    if (!data) return alert("No saved encounter found");
    if (!confirm("Load saved encounter?")) return;
    
    const parsed = JSON.parse(data);
    creatures = parsed.creatures || [];
    customTables = parsed.customTables || [];
    currentCreatureIndex = creatures.length ? 0 : -1;
    updateUI();
}

function importJSON() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const data = JSON.parse(ev.target.result);
                creatures = data.creatures || [];
                customTables = data.customTables || [];
                currentCreatureIndex = creatures.length ? 0 : -1;
                updateUI();
                alert("✅ JSON imported successfully");
            } catch(err) {
                alert("Invalid JSON file");
            }
        };
        reader.readAsText(e.target.files[0]);
    };
    input.click();
}

function exportJSON() {
    const data = {creatures, customTables};
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'rollpad.json';
    a.click();
}

function clearAllData() {
    if (confirm("Erase everything?")) {
        creatures = [];
        customTables = [];
        currentCreatureIndex = -1;
        localStorage.removeItem('rollpad_modern');
        updateUI();
    }
}

// ====================== INIT ======================
updateUI();

if (creatures.length === 0) {
    creatures.push({
        name: "GOBLIN", 
        moves: [
            {name: "Bite", dice: "1d6+2"},
            {name: "Scratch", dice: "1d4"}
        ]
    });
    currentCreatureIndex = 0;
    updateUI();
}
</script>
</body>
</html>
