<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLLPAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
        
        body {
            font-family: 'VT323', monospace;
            background: #0a0a0a;
            color: #22ff88;
            image-rendering: pixelated;
        }
        
        .window {
            background: #111111;
            border: 6px solid #22ff88;
            border-image: linear-gradient(#22ff88, #00cc66) 1;
            box-shadow: 0 0 40px #22ff88, inset 0 0 30px rgba(0, 255, 100, 0.2);
            border-radius: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 1400px;
            margin: 20px auto;
        }
        
        .title-bar {
            background: #000000;
            padding: 12px 20px;
            border-bottom: 4px solid #22ff88;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
            background: #0f0f0f;
        }
        
        .sidebar {
            width: 320px;
            background: #1a1a1a;
            border-right: 4px solid #22ff88;
            padding: 16px;
            overflow-y: auto;
        }
        
        .creature-item {
            background: #1f1f1f;
            border: 3px solid #444;
            padding: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.1s;
            font-size: 1.25rem;
        }
        
        .creature-item:hover {
            border-color: #22ff88;
            background: #2a2a2a;
            transform: translateX(6px);
        }
        
        .creature-item.active {
            border-color: #22ff88;
            background: #003300;
            box-shadow: 0 0 20px #22ff88;
        }
        
        .card {
            background: #1a1a1a;
            border: 3px solid #22ff88;
            padding: 20px;
            margin-bottom: 24px;
        }
        
        input {
            background: #000;
            border: 3px solid #22ff88;
            color: #22ff88;
            font-family: 'VT323', monospace;
            font-size: 1.3rem;
            padding: 12px;
        }
        
        button {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.1rem;
            transition: all 0.1s;
        }
        
        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }
        
        .last-roll {
            background: #22ff88;
            color: #000;
            padding: 8px 16px;
            border: 3px solid #000;
            font-weight: bold;
            display: inline-block;
            animation: rollPop 0.6s;
        }
        
        @keyframes rollPop {
            0% { transform: scale(0.5); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        .list-item {
            background: #1f1f1f;
            border: 3px solid #444;
            padding: 16px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }
        
        .list-item:hover {
            border-color: #22ff88;
        }
        
        .retro-grid {
            background-image: 
                linear-gradient(#22ff8822 1px, transparent 1px),
                linear-gradient(90deg, #22ff8822 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body>
<div class="window mx-auto">
    <!-- Title Bar -->
    <div class="title-bar">
        <div class="flex items-center gap-4">
            <i class="fa-solid fa-dice-d20 text-4xl text-[#22ff88]"></i>
            <h1 class="text-4xl tracking-widest">ROLLPAD</h1>
        </div>
        <button onclick="toggleEditMode()" 
                class="px-6 py-2 border-4 border-[#22ff88] hover:bg-[#22ff88] hover:text-black font-bold">
            <span id="edit-status">VIEW MODE</span>
        </button>
    </div>

    <!-- Menu Bar -->
    <div class="bg-black border-b-4 border-[#22ff88] px-6 py-4 flex gap-3 flex-wrap">
        <button onclick="addCreature()" 
                class="menu-btn px-6 py-3 border-4 border-[#22ff88] hover:bg-[#22ff88] hover:text-black">+ NEW CREATURE</button>
        <button onclick="saveEncounter()" 
                class="menu-btn px-6 py-3 border-4 border-[#22ff88] hover:bg-[#22ff88] hover:text-black">SAVE</button>
        <button onclick="loadEncounterPrompt()" 
                class="menu-btn px-6 py-3 border-4 border-[#22ff88] hover:bg-[#22ff88] hover:text-black">LOAD</button>
        <button onclick="importJSON()" 
                class="menu-btn px-6 py-3 border-4 border-[#22ff88] hover:bg-[#22ff88] hover:text-black">IMPORT</button>
        <button onclick="exportJSON()" 
                class="menu-btn px-6 py-3 border-4 border-[#22ff88] hover:bg-[#22ff88] hover:text-black">EXPORT</button>
        <button onclick="clearAllData()" 
                class="menu-btn px-6 py-3 border-4 border-red-500 hover:bg-red-500 hover:text-black text-red-400">CLEAR ALL</button>
    </div>

    <div class="main">
        <!-- Creature Sidebar -->
        <div class="sidebar retro-grid">
            <h3 class="text-2xl mb-4 border-b-4 border-[#22ff88] pb-2">BESTIARY</h3>
            <div id="creature-list" class="space-y-3"></div>
            
            <button onclick="addCreature()" 
                    class="w-full mt-6 py-4 border-4 border-[#22ff88] hover:bg-[#22ff88] hover:text-black text-xl font-bold">
                + SUMMON
            </button>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-8 overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 id="current-name" class="text-5xl tracking-widest">NO CREATURE SELECTED</h2>
            </div>

            <!-- Add Move -->
            <div class="card">
                <h3 class="text-3xl mb-6 flex items-center gap-3">
                    <i class="fa-solid fa-bolt"></i> ADD NEW MOVE
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="move-name" placeholder="MOVE NAME" class="w-full">
                    <input type="text" id="move-dice" placeholder="e.g. 8d6+4" class="w-full">
                    <button onclick="addMoveToCurrent()" 
                            class="bg-[#22ff88] text-black font-bold py-6 text-xl">ADD MOVE</button>
                </div>
            </div>

            <!-- Moves -->
            <h3 class="text-3xl mb-6 flex items-center gap-3">
                <i class="fa-solid fa-swords"></i> MOVES
            </h3>
            <div id="moves-list" class="space-y-4"></div>

            <!-- Custom Tables -->
            <div class="mt-12">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-3xl flex items-center gap-3">
                        <i class="fa-solid fa-table"></i> CUSTOM TABLES
                    </h3>
                    <button onclick="addCustomTable()" 
                            class="px-8 py-4 border-4 border-[#22ff88] hover:bg-[#22ff88] hover:text-black">NEW TABLE</button>
                </div>
                <div id="tables-container" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="bg-black border-t-4 border-[#22ff88] px-8 py-4 text-sm flex justify-between items-center">
        <div>RETRO • MODERN • TABLETOP</div>
        <div id="edit-status-footer">VIEW MODE</div>
        <div>CREATURES: <span id="creature-count" class="text-[#22ff88]">0</span></div>
    </div>
</div>

<script>
// ====================== DATA ======================
let creatures = [];
let currentCreatureIndex = -1;
let customTables = [];
let editMode = false;

// ====================== EDIT MODE ======================
function toggleEditMode() {
    editMode = !editMode;
    const status = editMode ? "EDIT MODE" : "VIEW MODE";
    document.getElementById('edit-status').textContent = status;
    document.getElementById('edit-status-footer').textContent = status;
    updateUI();
}

// ====================== DICE ======================
function rollDice(expr) {
    let total = 0;
    const parts = expr.replace(/\s/g,'').match(/[+-]?\d+d\d+|[+-]?\d+/gi) || [];
    for (let part of parts) {
        if (part.includes('d')) {
            const sign = part.startsWith('-') ? -1 : 1;
            const [count, sides] = part.replace(/^[+-]/,'').split('d').map(n => parseInt(n));
            for (let i = 0; i < (count || 1); i++) {
                total += sign * (Math.floor(Math.random() * sides) + 1);
            }
        } else {
            total += parseInt(part);
        }
    }
    return { total: total || 0 };
}

// ====================== UI ======================
function updateUI() {
    document.getElementById('creature-count').textContent = creatures.length;
    document.getElementById('current-name').textContent = 
        currentCreatureIndex >= 0 ? creatures[currentCreatureIndex].name.toUpperCase() : "NO CREATURE SELECTED";
    renderCreatureList();
    renderMoves();
    renderTables();
}

function renderCreatureList() {
    const container = document.getElementById('creature-list');
    container.innerHTML = '';
    
    creatures.forEach((creature, idx) => {
        const div = document.createElement('div');
        div.className = `creature-item flex justify-between items-center ${idx === currentCreatureIndex ? 'active' : ''}`;
        div.innerHTML = `
            <div class="font-bold">${creature.name}</div>
            <div class="text-sm text-[#22ff88]">${creature.moves.length} MOVES</div>
        `;
        div.onclick = () => {
            currentCreatureIndex = idx;
            updateUI();
        };
        container.appendChild(div);
    });
}

// ====================== MOVES ======================
function renderMoves() {
    const container = document.getElementById('moves-list');
    container.innerHTML = '';
    if (currentCreatureIndex < 0) return;

    creatures[currentCreatureIndex].moves.forEach((move, i) => {
        const div = document.createElement('div');
        div.className = 'list-item flex items-center justify-between';
        div.innerHTML = `
            <div>
                ${move.lastRoll !== undefined ? `<div class="last-roll">LAST ROLL: ${move.lastRoll}</div>` : ''}
                <div class="text-3xl">${move.name}</div>
                <div class="text-[#22ff88] text-2xl">${move.dice}</div>
            </div>
            <div class="flex gap-3">
                <button onclick="rollMove(${i}); event.stopImmediatePropagation()" 
                        class="px-10 py-6 border-4 border-[#22ff88] hover:bg-[#22ff88] hover:text-black text-xl">ROLL</button>
                ${editMode ? `
                <button onclick="removeMove(${i}); event.stopImmediatePropagation()" 
                        class="px-6 py-6 border-4 border-red-500 hover:bg-red-500 hover:text-black">✕</button>` : ''}
            </div>
        `;
        container.appendChild(div);
    });
}

function rollMove(i) {
    const move = creatures[currentCreatureIndex].moves[i];
    const result = rollDice(move.dice);
    move.lastRoll = result.total;
    renderMoves();
}

// ====================== TABLES ======================
function renderTables() {
    const container = document.getElementById('tables-container');
    container.innerHTML = '';

    customTables.forEach((table, idx) => {
        const div = document.createElement('div');
        div.className = 'list-item';
        let last = '';
        if (table.lastRoll) {
            last = `<div class="last-roll">ROLL ${table.lastRoll} → ${table.entries[table.lastRoll-1] || ''}</div>`;
        }
        div.innerHTML = `
            <div class="flex justify-between items-center">
                <div>
                    ${last}
                    <div class="text-3xl">${table.name}</div>
                    <div class="text-[#22ff88]">(${table.sides} entries)</div>
                </div>
                <div class="flex gap-3">
                    <button onclick="rollTable(${idx}); event.stopImmediatePropagation()" 
                            class="px-10 py-6 border-4 border-[#22ff88] hover:bg-[#22ff88] hover:text-black">ROLL</button>
                    ${editMode ? `
                    <button onclick="deleteTable(${idx}); event.stopImmediatePropagation()" 
                            class="px-6 py-6 border-4 border-red-500 hover:bg-red-500 hover:text-black">✕</button>` : ''}
                </div>
            </div>
        `;
        container.appendChild(div);
    });
}

function rollTable(idx) {
    const table = customTables[idx];
    const roll = Math.floor(Math.random() * table.sides) + 1;
    table.lastRoll = roll;
    renderTables();
}

// ====================== CREATURES ======================
function addCreature() {
    const name = prompt("Creature Name:");
    if (!name) return;
    creatures.push({ name: name.trim(), moves: [] });
    currentCreatureIndex = creatures.length - 1;
    updateUI();
}

function addMoveToCurrent() {
    if (currentCreatureIndex < 0) return alert("Select a creature first");
    const name = document.getElementById('move-name').value.trim();
    const dice = document.getElementById('move-dice').value.trim();
    if (!name || !dice) return alert("Name and dice required");
    
    creatures[currentCreatureIndex].moves.push({name, dice});
    document.getElementById('move-name').value = '';
    document.getElementById('move-dice').value = '';
    renderMoves();
}

function removeMove(i) {
    if (confirm("Delete move?")) {
        creatures[currentCreatureIndex].moves.splice(i, 1);
        renderMoves();
    }
}

// ====================== TABLES ======================
function addCustomTable() {
    const name = prompt("Table Name:");
    if (!name) return;
    const sides = parseInt(prompt("Number of entries?", "8")) || 8;
    const entries = [];
    for (let i = 1; i <= sides; i++) {
        entries.push(prompt(`Entry ${i}:`) || "(empty)");
    }
    customTables.push({name, sides, entries, lastRoll: null});
    renderTables();
}

function deleteTable(idx) {
    if (confirm("Delete table?")) {
        customTables.splice(idx, 1);
        renderTables();
    }
}

// ====================== SAVE / LOAD ======================
function saveEncounter() {
    localStorage.setItem('rollpad_retro', JSON.stringify({creatures, customTables}));
    alert("✅ Saved!");
}

function loadEncounterPrompt() {
    const data = localStorage.getItem('rollpad_retro');
    if (!data) return alert("No save found");
    if (!confirm("Load saved encounter?")) return;
    const parsed = JSON.parse(data);
    creatures = parsed.creatures || [];
    customTables = parsed.customTables || [];
    currentCreatureIndex = creatures.length ? 0 : -1;
    updateUI();
}

function importJSON() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const data = JSON.parse(ev.target.result);
                creatures = data.creatures || [];
                customTables = data.customTables || [];
                currentCreatureIndex = creatures.length ? 0 : -1;
                updateUI();
                alert("✅ Imported successfully");
            } catch(err) {
                alert("Invalid JSON");
            }
        };
        reader.readAsText(e.target.files[0]);
    };
    input.click();
}

function exportJSON() {
    const data = {creatures, customTables};
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'rollpad.json';
    a.click();
}

function clearAllData() {
    if (confirm("Clear everything?")) {
        creatures = [];
        customTables = [];
        currentCreatureIndex = -1;
        localStorage.removeItem('rollpad_retro');
        updateUI();
    }
}

// ====================== INIT ======================
updateUI();

if (creatures.length === 0) {
    creatures.push({
        name: "GOBLIN", 
        moves: [
            {name: "Bite", dice: "1d6+2"},
            {name: "Scratch", dice: "1d4"}
        ]
    });
    currentCreatureIndex = 0;
    updateUI();
}
</script>
</body>
</html>
