<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLLPAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0a; color: #e5e5e5; }
        .window { background: #1a1a1a; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.7); overflow: hidden; height: 100vh; display: flex; }
        .sidebar { background: #111; border-right: 1px solid #333; width: 260px; }
        .creature-item { padding: 12px 20px; cursor: pointer; transition: all 0.2s; }
        .creature-item:hover { background: #1f1f1f; }
        .creature-item.active { background: #22c55e; color: black; font-weight: 600; }
        .main { flex: 1; overflow-y: auto; padding: 24px; background: #141414; }
        .card { background: #1f1f1f; border-radius: 10px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        .list-item { background: #1f1f1f; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .last-roll { background: #22c55e; color: #000; padding: 6px 12px; border-radius: 6px; font-weight: 600; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="window flex h-screen max-w-7xl mx-auto mt-4">
    <!-- Sidebar (Creatures) - unchanged -->
    <div class="sidebar flex flex-col">
        <div class="p-5 border-b border-zinc-800">
            <h2 class="text-lg font-semibold flex items-center gap-2">
                <i class="fa-solid fa-dragon text-emerald-400"></i> CREATURES
            </h2>
        </div>
        <div id="creature-list" class="flex-1 overflow-y-auto"></div>
        <div class="p-4 border-t border-zinc-800">
            <button onclick="addCreature()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-lg font-medium flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus"></i> NEW CREATURE
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col">
        <div class="bg-zinc-900 px-6 py-4 flex items-center justify-between border-b border-zinc-800">
            <h1 id="current-name" class="text-2xl font-bold">NO CREATURE SELECTED</h1>
            <button onclick="toggleEditMode()" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg flex items-center gap-2">
                <i class="fa-solid fa-pen"></i>
                <span id="edit-status">VIEW MODE</span>
            </button>
        </div>

        <div class="bg-zinc-900 border-b border-zinc-800 px-6 py-3 flex gap-4 text-sm">
            <button onclick="saveEncounter()" class="flex items-center gap-2 hover:text-emerald-400"><i class="fa-solid fa-floppy-disk"></i> SAVE</button>
            <button onclick="loadEncounterPrompt()" class="flex items-center gap-2 hover:text-emerald-400"><i class="fa-solid fa-folder-open"></i> LOAD LOCAL</button>
            <button onclick="loadFromGitHub()" class="flex items-center gap-2 hover:text-sky-400"><i class="fa-solid fa-cloud-download-alt"></i> LOAD FROM GITHUB</button>
            <button onclick="importJSON()" class="flex items-center gap-2 hover:text-emerald-400"><i class="fa-solid fa-file-import"></i> IMPORT FILE</button>
            <button onclick="exportJSON()" class="flex items-center gap-2 hover:text-emerald-400"><i class="fa-solid fa-file-export"></i> EXPORT</button>
            <button onclick="clearAllData()" class="flex items-center gap-2 text-red-400 hover:text-red-300"><i class="fa-solid fa-trash"></i> CLEAR</button>
        </div>

        <div class="main">
            <!-- Add Move Card + Moves + Tables (same as before) -->
            <!-- ... keep everything from previous version here ... -->
        </div>
    </div>
</div>

<script>
// ==================== ADD THIS NEW FUNCTION ====================

async function loadFromGitHub() {
    const url = prompt("Paste the **raw** GitHub URL to your JSON file:\n\nExample:\nhttps://raw.githubusercontent.com/yourname/repo/main/encounter.json", "");
    
    if (!url) return;
    if (!url.includes("raw.githubusercontent.com")) {
        alert("Please use the RAW GitHub URL (click 'Raw' on your file on GitHub)");
        return;
    }

    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const data = await response.json();
        
        if (data.creatures) creatures = data.creatures;
        if (data.customTables) customTables = data.customTables;
        
        currentCreatureIndex = creatures.length ? 0 : -1;
        updateUI();
        
        alert("✅ Successfully loaded from GitHub!");
    } catch (err) {
        console.error(err);
        alert("Failed to load JSON from GitHub.\nMake sure the URL is public and ends with .json");
    }
}

// Keep all your existing functions (addCreature, renderCreatureList, etc.)

</script>
</body>
</html>
