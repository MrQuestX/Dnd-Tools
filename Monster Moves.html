<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Encounter Roller</title>
    <style>
        /* Minimal base styles – easy to override later */
        body { font-family: system-ui, sans-serif; margin: 0; padding: 0; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 280px; border-right: 1px solid #ccc; padding: 10px; overflow-y: auto; }
        .main { flex: 1; padding: 15px; overflow-y: auto; }
        button { margin: 4px 0; padding: 6px 12px; }
        input, select { margin: 4px 0; padding: 6px; width: 100%; box-sizing: border-box; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px; border: 1px solid #ddd; margin: 4px 0; cursor: move; display: flex; justify-content: space-between; align-items: center; }
        .roll-result { font-size: 1.4em; font-weight: bold; margin: 10px 0; padding: 10px; border: 1px solid #aaa; background: #f9f9f9; }
        .log { max-height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 8px; }
    </style>
</head>
<body>
<div class="container">
    <!-- Sidebar: Creatures -->
    <div class="sidebar">
        <h2>Creatures</h2>
        <button onclick="addCreature()">+ New Creature</button>
        <button onclick="saveEncounter()">Save Encounter</button>
        <button onclick="loadEncounterPrompt()">Load Encounter</button>
        <button onclick="exportJSON()">Export JSON</button>
        <button onclick="importJSONPrompt()">Import JSON</button>
        
        <ul id="creature-list"></ul>
    </div>

    <!-- Main Area -->
    <div class="main">
        <h1 id="current-creature-name">Select a creature</h1>
        
        <!-- Add Move -->
        <div style="margin: 15px 0; padding: 10px; border: 1px solid #ccc;">
            <h3>Add Move</h3>
            <input type="text" id="move-name" placeholder="Move name (e.g. Bite)">
            <input type="text" id="move-dice" placeholder="Dice (e.g. 1d20+7 or 2d6+3d8+4)">
            <button onclick="addMoveToCurrent()">Add Move</button>
        </div>

        <!-- Moves List -->
        <h3>Moves</h3>
        <ul id="moves-list"></ul>

        <!-- Custom Tables Section -->
        <h2 style="margin-top: 40px;">Custom Tables</h2>
        <button onclick="addCustomTable()">+ New Custom Table</button>
        <div id="tables-container"></div>
    </div>
</div>

<script>
// ====================== DATA ======================
let creatures = [];
let currentCreatureIndex = -1;
let customTables = [];

// ====================== DICE ROLLER ======================
function rollDice(expression) {
    let total = 0;
    let rolls = [];
    
    // Handle constant only
    if (!expression.includes('d')) {
        return { total: parseInt(expression) || 0, details: expression };
    }

    const parts = expression.replace(/\s/g, '').match(/([+-]?\d+d\d+|[+-]?\d+)/g) || [];
    
    for (let part of parts) {
        if (part.includes('d')) {
            // Extract sign, count, and sides
            let sign = 1;
            let cleanPart = part;
            
            if (part.startsWith('-')) {
                sign = -1;
                cleanPart = part.substring(1);
            } else if (part.startsWith('+')) {
                cleanPart = part.substring(1);
            }
            
            const [countStr, sidesStr] = cleanPart.split('d');
            const count = parseInt(countStr);
            const sides = parseInt(sidesStr);
            
            for (let i = 0; i < count; i++) {
                const roll = Math.floor(Math.random() * sides) + 1;
                rolls.push(roll);
                total += sign * roll;
            }
        } else {
            // Constant modifier
            total += parseInt(part);
        }
    }
    
    return {
        total: total,
        details: `${rolls.join(' + ')} = ${total}`
    };
}

// ====================== CREATURE MANAGEMENT ======================
function renderCreatureList() {
    const list = document.getElementById('creature-list');
    list.innerHTML = '';
    
    creatures.forEach((creature, index) => {
        const li = document.createElement('li');
        li.textContent = creature.name;
        li.onclick = () => selectCreature(index);
        if (index === currentCreatureIndex) li.style.background = '#ddd';
        
        const del = document.createElement('button');
        del.textContent = '×';
        del.onclick = (e) => { e.stopPropagation(); removeCreature(index); };
        li.appendChild(del);
        list.appendChild(li);
    });
}

function addCreature() {
    const name = prompt("Creature name:");
    if (!name) return;
    creatures.push({ name: name.trim(), moves: [] });
    renderCreatureList();
    selectCreature(creatures.length - 1);
}

function removeCreature(index) {
    if (confirm("Delete this creature?")) {
        creatures.splice(index, 1);
        if (currentCreatureIndex >= creatures.length) currentCreatureIndex = creatures.length - 1;
        renderCreatureList();
        if (creatures.length > 0) selectCreature(currentCreatureIndex);
        else {
            currentCreatureIndex = -1;
            document.getElementById('current-creature-name').textContent = "Select a creature";
            document.getElementById('moves-list').innerHTML = '';
        }
    }
}

function selectCreature(index) {
    currentCreatureIndex = index;
    renderCreatureList();
    renderMoves();
    document.getElementById('current-creature-name').textContent = creatures[index].name;
}

// ====================== MOVES ======================
function renderMoves() {
    const list = document.getElementById('moves-list');
    list.innerHTML = '';
    if (currentCreatureIndex < 0) return;
    
    const moves = creatures[currentCreatureIndex].moves;
    
    moves.forEach((move, i) => {
        const li = document.createElement('li');
        li.draggable = true;
        li.dataset.index = i;
        
        li.innerHTML = `
            <span><strong>${move.name}</strong> — ${move.dice}</span>
            <button onclick="rollMove(${i})">Roll</button>
        `;
        
        // Drag & Drop
        li.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text/plain', i);
        });
        li.addEventListener('dragover', (e) => e.preventDefault());
        li.addEventListener('drop', (e) => {
            e.preventDefault();
            const from = parseInt(e.dataTransfer.getData('text/plain'));
            const to = parseInt(li.dataset.index);
            if (from !== to) moveArray(creatures[currentCreatureIndex].moves, from, to);
            renderMoves();
        });
        
        list.appendChild(li);
    });
}

function moveArray(arr, from, to) {
    const item = arr.splice(from, 1)[0];
    arr.splice(to, 0, item);
}

function addMoveToCurrent() {
    if (currentCreatureIndex < 0) {
        alert("Select a creature first");
        return;
    }
    const name = document.getElementById('move-name').value.trim();
    const dice = document.getElementById('move-dice').value.trim();
    if (!name || !dice) {
        alert("Both name and dice are required");
        return;
    }
    creatures[currentCreatureIndex].moves.push({ name, dice });
    document.getElementById('move-name').value = '';
    document.getElementById('move-dice').value = '';
    renderMoves();
}

function rollMove(moveIndex) {
    if (currentCreatureIndex < 0) return;
    const move = creatures[currentCreatureIndex].moves[moveIndex];
    const result = rollDice(move.dice);
    
    const log = document.createElement('div');
    log.className = 'roll-result';
    log.innerHTML = `<strong>${move.name}:</strong> ${result.details}<br><span style="font-size:1.8em">${result.total}</span>`;
    
    // Insert at top of main area temporarily
    const main = document.querySelector('.main');
    main.insertBefore(log, main.children[2]);
    
    // Auto-remove after 8 seconds
    setTimeout(() => log.remove(), 8000);
}

// ====================== SAVE / LOAD / JSON ======================
function saveEncounter() {
    if (creatures.length === 0) return alert("Nothing to save");
    localStorage.setItem('dndEncounter', JSON.stringify({creatures, customTables}));
    alert("Encounter saved to browser!");
}

function loadEncounterPrompt() {
    if (localStorage.getItem('dndEncounter')) {
        if (confirm("Load saved encounter? Current data will be replaced.")) {
            const data = JSON.parse(localStorage.getItem('dndEncounter'));
            creatures = data.creatures || [];
            customTables = data.customTables || [];
            renderCreatureList();
            renderCustomTables();
            if (creatures.length > 0) selectCreature(0);
        }
    } else {
        alert("No saved encounter found");
    }
}

function exportJSON() {
    const data = {creatures, customTables};
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'dnd-encounter.json';
    a.click();
}

function importJSONPrompt() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const data = JSON.parse(ev.target.result);
                creatures = data.creatures || [];
                customTables = data.customTables || [];
                renderCreatureList();
                renderCustomTables();
                if (creatures.length > 0) selectCreature(0);
                alert("Imported successfully!");
            } catch(err) {
                alert("Invalid JSON file");
            }
        };
        reader.readAsText(file);
    };
    input.click();
}

// ====================== CUSTOM TABLES ======================
function renderCustomTables() {
    const container = document.getElementById('tables-container');
    container.innerHTML = '';
    
    customTables.forEach((table, tIndex) => {
        const div = document.createElement('div');
        div.style.border = '1px solid #aaa';
        div.style.margin = '10px 0';
        div.style.padding = '10px';
        
        div.innerHTML = `
            <strong>${table.name} (d${table.sides})</strong>
            <button onclick="rollCustomTable(${tIndex})">Roll Table</button>
            <button onclick="editTable(${tIndex})">Edit</button>
            <button onclick="deleteTable(${tIndex})">Delete</button>
        `;
        
        const ul = document.createElement('ul');
        table.entries.forEach((entry, i) => {
            const li = document.createElement('li');
            li.textContent = `${i+1}. ${entry}`;
            ul.appendChild(li);
        });
        div.appendChild(ul);
        container.appendChild(div);
    });
}

function addCustomTable() {
    const name = prompt("Table name:");
    if (!name) return;
    const sides = parseInt(prompt("How many sides? (e.g. 6, 8, 20)", "6"));
    if (!sides) return;
    
    const entries = [];
    for (let i = 1; i <= sides; i++) {
        const entry = prompt(`Entry ${i}/${sides}:`);
        if (entry === null) return; // cancel
        entries.push(entry || `(empty)`);
    }
    
    customTables.push({ name, sides, entries });
    renderCustomTables();
}

function rollCustomTable(tIndex) {
    const table = customTables[tIndex];
    const roll = Math.floor(Math.random() * table.sides) + 1;
    alert(`${table.name}\n\nRolled: ${roll}\nResult: ${table.entries[roll-1]}`);
}

function editTable(tIndex) {
    // Simple re-prompt version
    const table = customTables[tIndex];
    const newName = prompt("New name:", table.name);
    if (newName) table.name = newName;
    
    const newSides = parseInt(prompt("New sides?", table.sides));
    if (newSides && newSides !== table.sides) {
        table.sides = newSides;
        table.entries = [];
        for (let i = 1; i <= newSides; i++) {
            const entry = prompt(`Entry ${i}/${newSides}:`, table.entries[i-1] || '');
            table.entries.push(entry || `(empty)`);
        }
    }
    renderCustomTables();
}

function deleteTable(tIndex) {
    if (confirm("Delete this table?")) {
        customTables.splice(tIndex, 1);
        renderCustomTables();
    }
}

// ====================== INIT ======================
renderCreatureList();
renderCustomTables();
</script>
</body>
</html>
